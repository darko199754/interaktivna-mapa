<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Interaktivna mapa</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="map"></div>

<!-- Dugmad -->

<button id="filterBtn">☰ Filter</button>

<button id="gpsBtn">📍</button>

<button id="routesBtn">🥾</button>


<!-- FILTER -->

<div class="filters" id="filterPanel">

  <h3>Filter</h3>

  <b>Tip staze</b><br>

  <label><input type="checkbox" class="tip" value="pesacka" checked> Pešačka</label><br>

  <label><input type="checkbox" class="tip" value="biciklisticka" checked> Biciklistička</label><br>

  <label><input type="checkbox" class="tip" value="kvad" checked> Kvad</label>

  <br><br>

  <b>Težina</b><br>

  <label><input type="checkbox" class="tezina" value="laka" checked> Laka</label><br>

  <label><input type="checkbox" class="tezina" value="srednja" checked> Srednja</label><br>

  <label><input type="checkbox" class="tezina" value="teska" checked> Teška</label>

  <br><br>

  <b>Lokacije</b><br>

  <label><input type="checkbox" id="lokacijeToggle" checked> Prikaži</label>

  <br><br>

  <b>Turizam</b><br>

  <label><input type="checkbox" id="turizamToggle" checked> Prikaži</label>

</div>


<!-- PANEL STAZE -->

<div id="routesPanel">

    <div class="routesHeader">

        <h2>🥾 Sve staze</h2>

        <button id="closeRoutes">✖</button>

    </div>

    <input
        id="routeSearch"
        type="text"
        placeholder="Pretraži stazu...">

    <div id="routeList">

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="script.js?v=5"></script>

</body>
</html>
